<doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>{% block title %}Genesis Core{% endblock title %}</title>
</head>

<body>
    <nav class="py-6 px-6 flex justify-between items-center border-b border-gray-200 ">
        <a href="/" class="text-2xl font-bold">Genesis Core</a>
        <div class="space-x-6">
            <a href="#" class="text-lg font-semibold hover:text-gray-900">Item</a>
            <a href="#" class="text-lg font-semibold hover:text-gray-900">Browse</a>

            <a href="{% url 'core:signup' %}" class="px-6 py-3 text-lg font-semibold bg-teal-500 text-white rounded-xl hover:text-white-900 hover:bg-teal-700">Sign Up</a>
            <a href="#" class="px-6 py-3 text-lg font-semibold bg-blue-500 text-white rounded-xl hover:text-white-900 hover:bg-blue-700">Log In</a>
        </div>
    </nav>
        

    <div class="px-6 py-6">
        {% block content %}
        {% endblock content %}  
    </div>

    <footer class="py-6 px-6 border-t border-gray-200 text-center">
        <p class="text-sm text-gray-500">© 2026 Genesis Core. All rights reserved.</p>
<ul class="mt-4 space-x-4">
            <li class="inline"><a href="#" class="text-gray-500 hover:text-gray-900">Privacy Policy</a></li>
            <li class="inline"><a href="#" class="text-gray-500 hover:text-gray-900">Terms of Service</a></li>
            <li class="inline"><a href="{% url 'core:contact' %}" class="text-gray-500 hover:text-gray-900">Contact Us</a></li>
        </ul>

    </footer>
</body>

</html>
